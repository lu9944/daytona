name: daytona

services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./conf/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./conf/ssl:/etc/nginx/ssl:ro
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    depends_on:
      - api
      - proxy
      - dex
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null --no-check-certificate https://127.0.0.1/ 2>/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: daytona/daytona-api:${DAYTONA_VERSION}
    env_file:
      - conf/daytona.env
    environment:
      - PORT=3000
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    restart: always
    privileged: true
    depends_on:
      - runner
      - dex
      - registry
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/config']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  proxy:
    image: daytona/daytona-proxy:${DAYTONA_VERSION}
    env_file:
      - conf/daytona.env
    environment:
      - PROXY_PORT=4000
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 10

  runner:
    image: daytona/daytona-runner:${DAYTONA_VERSION}
    env_file:
      - conf/daytona.env
    environment:
      - API_PORT=3003
      - ENVIRONMENT=development
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '3003:3003'
    privileged: true
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3003/']
      interval: 10s
      timeout: 5s
      retries: 10

  ssh-gateway:
    image: daytona/daytona-ssh-gateway:${DAYTONA_VERSION}
    env_file:
      - conf/daytona.env
    environment:
      - SSH_GATEWAY_PORT=2222
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '2222:2222'
    restart: always

  otel-collector-exporter:
    image: daytona/daytona-otel-collector:${DAYTONA_VERSION}
    env_file:
      - conf/daytona.env
    volumes:
      - ./conf/otel/collector-config.yaml:/otelcol/collector-config.yaml
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    restart: always

  dex:
    image: dexidp/dex:v2.42.0
    volumes:
      - ./conf/dex/config.yaml:/etc/dex/config.yaml
      - dex_db:/var/dex
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    entrypoint: ['sh', '-c', 'touch /var/dex/dex.db && exec dex serve /etc/dex/config.yaml']
    networks:
      - daytona-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://localhost:5556/dex/.well-known/openid-configuration']

  registry:
    image: registry:2.8.2
    restart: always
    volumes:
      - registry:/var/lib/registry
      - ./conf/registry/config.yml:/etc/docker/registry/config.yml
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '6000:6000'

  registry-ui:
    image: joxit/docker-registry-ui:main
    restart: always
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Docker Registry UI
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
      - NGINX_PROXY_PASS_URL=http://registry:6000
      - SHOW_CATALOG_NB_TAGS=true
      - CATALOG_MIN_BRANCHES=1
      - CATALOG_MAX_BRANCHES=1
      - TAGLIST_PAGE_SIZE=100
      - REGISTRY_SECURED=false
      - CATALOG_ELEMENTS_LIMIT=1000
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '5100:80'

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - MINIO_IDENTITY_STS_EXPIRY="24h"
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    volumes:
      - minio_data:/data
    command: server /data --console-address ":${MINIO_PORT}"
    networks:
      - daytona-network
    ports:
      - '${MINIO_PORT}:${MINIO_PORT}'
      - '9000:9000'

  maildev:
    image: maildev/maildev
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '1080:1080'

  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network
    ports:
      - '16686:16686'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.138.0
    volumes:
      - ./conf/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      - no_proxy=
      - NO_PROXY=
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    networks:
      - daytona-network

  pgadmin:
    image: dpage/pgadmin4:9.2.0
    entrypoint: ['sh', '-c', 'chmod 600 /pgpass && exec /entrypoint.sh']
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@daytona.io
      PGADMIN_DEFAULT_PASSWORD: pgadmin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    user: root
    volumes:
      - ./conf/pgadmin4/servers.json:/pgadmin4/servers.json
      - ./conf/pgadmin4/pgpass:/pgpass
    ports:
      - '5050:80'
    networks:
      - daytona-network

volumes:
  registry: {}
  minio_data: {}
  db_data: {}
  dex_db: {}

networks:
  daytona-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DAYTONA_DOCKER_SUBNET}
