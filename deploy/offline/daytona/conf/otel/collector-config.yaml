receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

exporters:
  daytona_exporter:
    sandbox_auth_token_header: 'sandbox-auth-token'
    cache_ttl: 5m
    default_timeout: 30s
    sending_queue:
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    api_url: ${env:DAYTONA_API_URL:-http://api:3000/api}
    api_key: ${env:OTEL_COLLECTOR_API_KEY:-otel_collector_api_key}
    redis:
      host: '${env:REDIS_HOST:-redis}'
      port: '${env:REDIS_PORT:-6379}'
      password: '${env:REDIS_PASSWORD:-}'

extensions:
  healthcheckv2:
    use_v2: true
    component_health:
      include_permanent_errors: false
      include_recoverable_errors: true
      recovery_duration: 5m
    http:
      endpoint: '0.0.0.0:13133'
      status:
        enabled: true
        path: '/health/status'
      config:
        enabled: true
        path: '/health/config'
    grpc:
      endpoint: '0.0.0.0:13132'
      transport: 'tcp'

service:
  extensions: [healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [daytona_exporter]
    metrics:
      receivers: [otlp]
      exporters: [daytona_exporter]
    logs:
      receivers: [otlp]
      exporters: [daytona_exporter]
