# ======================== 基础配置 ========================
## 安装目录
DAYTONA_BASE=/opt
## 主机域名（已固化）
DAYTONA_HOSTNAME=code.bitzh.edu.cn
## Docker 网段设置
DAYTONA_DOCKER_SUBNET=172.31.250.192/26

# ======================== 数据库配置 ========================
## 是否使用外部数据库
DAYTONA_EXTERNAL_DB=false
DB_HOST=db
DB_PORT=5432
DB_USERNAME=user
DB_PASSWORD=pass
DB_DATABASE=daytona

# ======================== Redis 配置 ========================
## 是否使用外部 Redis
DAYTONA_EXTERNAL_REDIS=false
REDIS_HOST=redis
REDIS_PORT=6379

# ======================== 对象存储配置 ========================
S3_ACCESS_KEY=minioadmin
S3_SECRET_KEY=minioadmin
MINIO_PORT=9001

# ======================== 镜像仓库配置 ========================
REGISTRY_ADMIN=admin
REGISTRY_PASSWORD=password

# ======================== Keycloak 配置 ========================
KEYCLOAK_ADMIN_USER=admin
KEYCLOAK_ADMIN_PASSWORD=admin
KEYCLOAK_DB_PASSWORD=keycloak

# ======================== 镜像配置 ========================
DAYTONA_VERSION=v0.0.1
